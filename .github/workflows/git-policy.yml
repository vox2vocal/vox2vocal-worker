name: git-policy

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read

jobs:
  git-policy:
    name: git-policy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate pull request branch
        if: github.event_name == 'pull_request'
        run: bash ./scripts/validate-git-policy.sh --branch-name "${{ github.head_ref }}"

      - name: Validate pull request commits
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          if git cat-file -e "${{ github.event.pull_request.base.sha }}:scripts/validate-git-policy.sh" 2>/dev/null; then
            git show "${{ github.event.pull_request.base.sha }}:scripts/validate-git-policy.sh" > /tmp/validate-git-policy.sh
            chmod +x /tmp/validate-git-policy.sh
            bash /tmp/validate-git-policy.sh --range "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}"
          else
            bash ./scripts/validate-git-policy.sh --range "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}"
          fi

      - name: Validate current commit
        if: github.event_name == 'workflow_dispatch'
        run: bash ./scripts/validate-git-policy.sh --commit "${{ github.sha }}"
